<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فولتشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { background: white; width: 90%; max-width: 500px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; margin-top: 50px; text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .client-item { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; text-align: right; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>جاري الاتصال بالسحابة...</p>
    <button id="forceBypass" style="display:none; margin-top:15px; border:none; background:none; color:blue; text-decoration:underline;">استمرار يدوي (في حال التعليق)</button>
</div>

<div id="adminPanel" class="container">
    <h2>إدارة المشتركين</h2>
    <input type="text" id="in-name" placeholder="اسم المشترك">
    <input type="date" id="in-expiry">
    <input type="text" id="in-plan" placeholder="اسم المستخدم">
    <input type="text" id="in-pass" placeholder="كلمة السر">
    <button class="btn" onclick="saveClient()">+ إضافة وحفظ</button>
    <div id="clientsList" style="margin-top:20px;"></div>
</div>

<div id="clientView" class="container">
    <h2 id="v-name"></h2>
    <div style="background:#f0f7ff; padding:20px; border-radius:15px; margin:15px 0;">
        <p>تاريخ النهاية: <b id="v-end"></b></p>
        <p>اسم المستخدم: <b id="v-plan"></b></p>
        <p>كلمة السر: <b id="v-pass"></b></p>
    </div>
    <a href="https://wa.me/966594393012" class="btn" style="display:block; text-decoration:none; background:#25d366;">تواصل مع الدعم</a>
</div>

<script>
    const ADMIN_KEY = "AboNawaf_Platform_2026"; 
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    let fullData = { clients: [] };

    // إظهار زر التخطي بعد 5 ثوانٍ إذا علق التحميل
    setTimeout(() => { document.getElementById('forceBypass').style.display = 'block'; }, 5000);
    document.getElementById('forceBypass').onclick = () => { document.getElementById('loading').style.display = 'none'; route(); };

    async function loadData() {
        try {
            // إضافة timeout للطلب لضمان عدم التعليق للأبد
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 8000);
            
            const response = await fetch(DB_URL, { signal: controller.signal });
            clearTimeout(id);
            
            const data = await response.json();
            if (data && data.clients) fullData = data;
            
            document.getElementById('loading').style.display = 'none';
            route();
        } catch (err) {
            console.error("Fetch error:", err);
            document.getElementById('loading').style.display = 'none';
            route(); // محاولة التوجيه حتى لو فشل الجلب
        }
    }

    function route() {
        const params = new URLSearchParams(window.location.search);
        const user = params.get('user');
        const admin = params.get('admin');

        if (admin === ADMIN_KEY) {
            document.getElementById('adminPanel').style.display = 'block';
            renderAdmin();
        } else if (user) {
            const c = (fullData.clients || []).find(i => i.name === decodeURIComponent(user));
            if (c) {
                document.getElementById('clientView').style.display = 'block';
                document.getElementById('v-name').innerText = "مرحباً " + c.name;
                document.getElementById('v-end').innerText = c.expiry;
                document.getElementById('v-plan').innerText = c.plan;
                document.getElementById('v-pass').innerText = c.pass;
            } else {
                alert("المشترك غير موجود في السحابة");
            }
        } else {
            alert("يرجى استخدام رابط صحيح");
        }
    }

    function renderAdmin() {
        const list = document.getElementById('clientsList');
        list.innerHTML = (fullData.clients || []).map((c, i) => `
            <div class="client-item">
                <b>${c.name}</b> | ينتهي: ${c.expiry}
                <button onclick="copyLink('${c.name}')" style="float:left;">نسخ الرابط</button>
            </div>
        `).join('');
    }

    async function saveClient() {
        const name = document.getElementById('in-name').value;
        const expiry = document.getElementById('in-expiry').value;
        if(!name || !expiry) return alert("أكمل البيانات");

        const newClient = {
            name: name,
            expiry: expiry,
            plan: document.getElementById('in-plan').value,
            pass: document.getElementById('in-pass').value
        };

        if(!fullData.clients) fullData.clients = [];
        fullData.clients.push(newClient);

        try {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
            alert("تم الحفظ بنجاح");
            location.reload();
        } catch (e) { alert("فشلت المزامنة، تأكد من الـ Rules في Firebase"); }
    }

    function copyLink(name) {
        const link = window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(name);
        navigator.clipboard.writeText(link);
        alert("تم نسخ الرابط");
    }

    loadData();
</script>
</body>
</html>
