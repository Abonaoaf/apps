<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المشتركين | فولتشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التنسيقات الأساسية المستخلصة من ملفك */
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --whatsapp: #25d366; --channel: #008069; --danger: #dc3545; --text: #2d3748; --warning: #ffc107; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--text); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .client-view, .admin-panel { background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; display: none; padding: 20px; margin: 20px auto; position: relative; }
        @media (min-width: 768px) { .admin-panel { max-width: 900px; } .client-view { max-width: 500px; } }
        
        /* تنسيقات إضافية لضمان عدم ظهور صفحة بيضاء */
        .error-msg { text-align: center; color: var(--danger); padding: 20px; display: none; }
        .status-bar { height: 6px; width: 100%; position: absolute; top: 0; left: 0; border-radius: 24px 24px 0 0; }
        .info-row { display: flex; justify-content: space-between; background: #f8fafc; padding: 12px; margin-bottom: 8px; border-radius: 12px; border: 1px solid #eee; }
        .btn-contact { display: block; text-align: center; padding: 12px; margin-top: 10px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; }
        .timer-section { background: #f1f5f9; padding: 15px; border-radius: 20px; text-align: center; margin: 15px 0; direction: ltr; }
        
        /* لوحة التحكم */
        .client-item { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 15px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>جاري تحميل منصة فولتشر...</p>
</div>

<div id="errorArea" class="error-msg">
    <i class="fas fa-exclamation-triangle fa-3x"></i>
    <p id="errorText">حدث خطأ في الاتصال بالسحابة</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
</div>

<div id="clientView" class="client-view">
    <div id="v-status-bar" class="status-bar"></div>
    <h2 id="v-name" style="text-align:center;"></h2>
    <div class="info-body">
        <div class="info-row"><span>تاريخ النهاية:</span> <span id="v-end"></span></div>
        <div class="info-row"><span>اسم المستخدم:</span> <span id="v-plan"></span></div>
        <div class="info-row"><span>كلمة السر:</span> <span id="v-pass"></span></div>
        <div class="timer-section" id="timer"></div>
        <a href="https://wa.me/966594393012" class="btn-contact" style="background:var(--whatsapp);">الدعم الفني المباشر</a>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>لوحة الإدارة</h2>
        <button class="btn-add" onclick="openModal()">+ مشترك جديد</button>
    </div>
    <hr>
    <div id="clientsList"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>بيانات المشترك</h3>
        <input type="hidden" id="editIndex">
        <label>الاسم:</label><input type="text" id="in-name">
        <label>تاريخ النهاية:</label><input type="date" id="in-expiry">
        <label>اسم المستخدم:</label><input type="text" id="in-plan">
        <label>كلمة السر:</label><input type="text" id="in-pass">
        <button class="btn-add" style="width:100%" onclick="saveClient()">حفظ ومزامنة</button>
        <button onclick="closeModal()" style="width:100%; background:#ccc; border:none; margin-top:5px; padding:10px; border-radius:8px;">إلغاء</button>
    </div>
</div>

<script>
    [span_0](start_span)// الإعدادات المباشرة من صورتك[span_0](end_span)
    const ADMIN_KEY = "AboNawaf_Platform_2026"; 
    [span_1](start_span)const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";[span_1](end_span)
    
    let fullData = { clients: [] };
    const params = new URLSearchParams(window.location.search);

    // 1. وظيفة التحميل الأساسية
    async function init() {
        try {
            const response = await fetch(DB_URL);
            if (!response.ok) throw new Error("فشل الوصول لقاعدة البيانات");
            const data = await response.json();
            if (data) fullData = data;
            
            route();
        } catch (err) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorArea').style.display = 'block';
            document.getElementById('errorText').innerText = "خطأ: تأكد من إعدادات Firebase (Rules)";
        }
    }

    // 2. نظام التوجيه (أدمن أم عميل)
    function route() {
        document.getElementById('loading').style.display = 'none';
        const user = params.get('user');
        const admin = params.get('admin');

        if (admin === ADMIN_KEY) {
            document.getElementById('adminPanel').style.display = 'block';
            renderAdmin();
        } else if (user) {
            showUser(decodeURIComponent(user));
        } else {
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>عذراً، الرابط غير صحيح</h2>";
        }
    }

    // 3. عرض بيانات العميل
    function showUser(userName) {
        const c = (fullData.clients || []).find(i => i.name === userName);
        if (!c) {
            document.body.innerHTML = "<h2>المشترك غير موجود</h2>";
            return;
        }
        document.getElementById('clientView').style.display = 'block';
        document.getElementById('v-name').innerText = "مرحباً " + c.name;
        document.getElementById('v-end').innerText = c.expiry;
        document.getElementById('v-plan').innerText = c.plan;
        document.getElementById('v-pass').innerText = c.pass;
        
        // تشغيل المؤقت
        setInterval(() => {
            const diff = new Date(c.expiry) - new Date();
            if (diff <= 0) {
                document.getElementById('timer').innerHTML = "الاشتراك منتهي";
                document.getElementById('v-status-bar').style.backgroundColor = "red";
            } else {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                document.getElementById('timer').innerHTML = `متبقي: ${d} يوم و ${h} ساعة`;
                document.getElementById('v-status-bar').style.backgroundColor = "green";
            }
        }, 1000);
    }

    // 4. وظائف الإدارة
    function renderAdmin() {
        const list = document.getElementById('clientsList');
        list.innerHTML = (fullData.clients || []).map((c, i) => `
            <div class="client-item">
                <strong>${c.name}</strong> - ينتهي: ${c.expiry}
                <br>
                <button onclick="copyLink('${c.name}')">نسخ الرابط</button>
                <button onclick="deleteClient(${i})" style="color:red">حذف</button>
            </div>
        `).join('');
    }

    async function saveClient() {
        const newClient = {
            name: document.getElementById('in-name').value,
            expiry: document.getElementById('in-expiry').value,
            plan: document.getElementById('in-plan').value,
            pass: document.getElementById('in-pass').value
        };
        
        if(!fullData.clients) fullData.clients = [];
        fullData.clients.push(newClient);
        
        [span_2](start_span)// المزامنة مع Firebase[span_2](end_span)
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        alert("تم الحفظ بنجاح");
        location.reload();
    }

    function deleteClient(i) {
        if(confirm("هل أنت متأكد؟")) {
            fullData.clients.splice(i, 1);
            fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) }).then(() => location.reload());
        }
    }

    function copyLink(name) {
        const url = window.location.href.split('?')[0] + "?user=" + encodeURIComponent(name);
        navigator.clipboard.writeText(url);
        alert("تم نسخ رابط العميل");
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // بدء التشغيل
    init();
</script>

</body>
</html>
