<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فولتشر v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --danger: #dc3545; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .loading-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .admin-panel, .client-view { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; display: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; }
        .btn-add { background: var(--success); }
        .btn-copy { background: var(--primary); }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="spinner"></div><p>جاري فحص السحابة...</p></div>

<div id="adminPanel" class="admin-panel">
    <h2><i class="fas fa-lock"></i> لوحة الإدارة</h2>
    <div style="background: #eef2ff; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <label>إضافة مشترك جديد:</label>
        <input type="text" id="in-name" placeholder="اسم العميل (مثال: احمد)">
        <input type="text" id="in-user" placeholder="اسم المستخدم">
        <input type="text" id="in-pass" placeholder="كلمة السر">
        <input type="date" id="in-end">
        <button class="btn btn-add" onclick="addNewClient()">حفظ ومزامنة</button>
    </div>
    <div id="list"></div>
</div>

<div id="clientView" class="client-view">
    <h2 id="v-name" style="text-align:center;"></h2>
    <div style="background:#f8fafc; padding:15px; border-radius:15px; border:1px solid #eee;">
        <p>👤 المستخدم: <b id="v-user"></b></p>
        <p>🔑 كلمة السر: <b id="v-pass"></b></p>
        <p>📅 ينتهي في: <b id="v-end"></b></p>
    </div>
    <button class="btn btn-copy" onclick="location.href='https://wa.me/966594393012'">تواصل مع الدعم</button>
</div>

<script>
    // الرابط المباشر لقاعدة بياناتك
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/data.json";
    const ADMIN_PASS = "AboNawaf_Platform_2026";
    const params = new URLSearchParams(window.location.search);
    let store = { clients: [] };

    async function start() {
        try {
            const res = await fetch(DB_URL);
            const cloudData = await res.json();
            
            // إذا كانت قاعدة البيانات فارغة تماماً، نقوم بتهيئتها
            if (!cloudData || !cloudData.clients) {
                console.log("Initializing database...");
                await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ clients: [] }) });
            } else {
                store = cloudData;
            }

            route();
        } catch (err) {
            document.body.innerHTML = `<div style="text-align:center; padding:50px;">
                <h2 style="color:red;">❌ خطأ في الاتصال</h2>
                <p>يجب عليك تفعيل القواعد (Rules) في Firebase أولاً</p>
                <code style="background:#eee;padding:10px;">.read: true, .write: true</code>
            </div>`;
        }
        document.getElementById('loading').style.display = 'none';
    }

    function route() {
        const user = params.get('user');
        const admin = params.get('admin');

        if (admin === ADMIN_PASS) {
            document.getElementById('adminPanel').style.display = 'block';
            renderList();
        } else if (user) {
            const c = store.clients.find(item => item.name === decodeURIComponent(user));
            if (c) {
                document.getElementById('clientView').style.display = 'block';
                document.getElementById('v-name').innerText = "مرحباً " + c.name;
                document.getElementById('v-user').innerText = c.user;
                document.getElementById('v-pass').innerText = c.pass;
                document.getElementById('v-end').innerText = c.end;
            } else {
                alert("المشترك غير موجود");
            }
        } else {
            alert("يرجى استخدام رابط المسؤول");
        }
    }

    async function addNewClient() {
        const name = document.getElementById('in-name').value;
        const user = document.getElementById('in-user').value;
        const pass = document.getElementById('in-pass').value;
        const end = document.getElementById('in-end').value;

        if (!name || !end) return alert("امسح البيانات كاملة");

        store.clients.push({ name, user, pass, end });
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(store) });
        renderList();
        alert("تم الحفظ بنجاح");
    }

    function renderList() {
        document.getElementById('list').innerHTML = store.clients.map((c, i) => `
            <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <span>${c.name}</span>
                <button onclick="copyLink('${c.name}')" style="font-size:10px;">نسخ الرابط</button>
            </div>
        `).join('');
    }

    function copyLink(n) {
        const url = window.location.href.split('?')[0] + "?user=" + encodeURIComponent(n);
        navigator.clipboard.writeText(url);
        alert("تم نسخ رابط العميل");
    }

    start();
</script>
</body>
</html>
