<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فولتشر | إدارة المشتركين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; padding: 25px; align-self: center; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        .client-item { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; position: relative; }
        .loading { display: none; text-align: center; color: var(--primary); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="adminPanel">
        <h2 style="text-align:center; color:var(--primary);">🦅 لوحة إدارة فولتشر</h2>
        <div class="input-group"><input type="text" id="name" placeholder="اسم المشترك الجديد"></div>
        <div class="input-group"><input type="date" id="expiry" title="تاريخ انتهاء الاشتراك"></div>
        <button class="btn" onclick="saveToCloud()">حفظ ومزامنة السحابة</button>
        <div id="loadMsg" class="loading">جاري المزامنة مع Firebase...</div>
        <hr style="margin: 20px 0; opacity: 0.2;">
        <div id="list"></div>
    </div>
</div>

<script>
    // الرابط من واقع صورتك تماماً
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";

    // 1. جلب البيانات عند فتح الصفحة
    async function fetchClients() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            
            if (data && data.clients) {
                data.clients.forEach((c, i) => {
                    listDiv.innerHTML += `
                        <div class="client-item">
                            <b>${c.name}</b> <br>
                            <small>ينتهي في: ${c.expiry}</small>
                            <button onclick="copyLink('${c.name}')" style="float:left; font-size:0.7rem;">نسخ الرابط</button>
                        </div>`;
                });
            }
        } catch (e) { console.error("Error loading"); }
    }

    // 2. إضافة مشترك جديد وحفظه
    async function saveToCloud() {
        const name = document.getElementById('name').value;
        const expiry = document.getElementById('expiry').value;
        if (!name || !expiry) return alert("يرجى إدخال الاسم والتاريخ");

        document.getElementById('loadMsg').style.display = "block";

        try {
            // جلب البيانات الحالية أولاً
            const res = await fetch(DB_URL);
            let data = await res.json() || { clients: [] };
            if (!data.clients) data.clients = [];

            // إضافة المشترك الجديد
            data.clients.push({ name: name, expiry: expiry });

            // إرسال البيانات المحدثة للسحابة
            const saveRes = await fetch(DB_URL, {
                method: 'PUT',
                body: JSON.stringify(data)
            });

            if (saveRes.ok) {
                alert("تم الحفظ بنجاح!");
                document.getElementById('name').value = "";
                fetchClients();
            }
        } catch (e) { alert("حدث خطأ أثناء المزامنة"); }
        document.getElementById('loadMsg').style.display = "none";
    }

    function copyLink(n) {
        const url = window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(n);
        navigator.clipboard.writeText(url);
        alert("تم نسخ رابط العميل");
    }

    fetchClients();
</script>
</body>
</html>
